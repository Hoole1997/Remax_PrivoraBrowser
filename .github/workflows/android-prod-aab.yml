name: Build prod signed AAB

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - app/src/prod/release.keystore

permissions:
  contents: write
  packages: read

concurrency:
  group: prod-aab-main
  cancel-in-progress: false

jobs:
  build-prod-aab:
    runs-on: ubuntu-latest

    env:
      KEYSTORE_REPO_PATH: app/src/prod/release.keystore
      KEYSTORE_GRADLE_PATH: app/src/prod/release.keystore
      KEYSTORE_ALIAS: browser
      KEYSTORE_PASSWORD: "123456"
      KEY_PASSWORD: "123456"
      GRADLE_JVM_ARGS: -Xmx6144m -XX:MaxMetaspaceSize=1024m -XX:+UseParallelGC -Dfile.encoding=UTF-8
      KOTLIN_DAEMON_JVM_ARGS: -Xmx1024m
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_PACKAGES_USER: ${{ secrets.GH_PACKAGES_USER || vars.GH_PACKAGES_USER || github.actor }}
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || vars.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: true

      - name: Validate GitHub Packages credentials
        run: |
          set -euo pipefail

          if [ -z "${GH_PACKAGES_USER:-}" ]; then
            echo "::error::Missing GitHub Packages user. Configure GH_PACKAGES_USER or rely on github.actor."
            exit 1
          fi

          if [ -z "${GH_PACKAGES_TOKEN:-}" ]; then
            echo "::error::Missing GitHub Packages token. Configure GH_PACKAGES_TOKEN or rely on GITHUB_TOKEN."
            exit 1
          fi

          echo "GitHub Packages user: ${GH_PACKAGES_USER}"
          echo "GitHub Packages token: configured"

      - name: Check GitHub Packages access
        run: |
          set -euo pipefail

          POM_URL="https://maven.pkg.github.com/toukaRemax/remax_sdk/com/github/toukaremax/core/1.0.11/core-1.0.11.pom"
          HTTP_CODE="$(curl \
            --silent \
            --show-error \
            --location \
            --output /dev/null \
            --write-out "%{http_code}" \
            --user "${GH_PACKAGES_USER}:${GH_PACKAGES_TOKEN}" \
            "$POM_URL")"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Cannot read GitHub Packages dependency metadata. HTTP status: $HTTP_CODE. Check GH_PACKAGES_USER/GH_PACKAGES_TOKEN permissions for toukaRemax/remax_sdk."
            exit 1
          fi

          echo "GitHub Packages access check passed."

      - name: Ensure prod release keystore exists
        id: ensure_keystore
        run: |
          set -euo pipefail

          mkdir -p "$(dirname "$KEYSTORE_REPO_PATH")"

          if [ -f "$KEYSTORE_REPO_PATH" ] && [ -s "$KEYSTORE_REPO_PATH" ]; then
            echo "Using existing keystore: $KEYSTORE_REPO_PATH"
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          keytool -genkeypair \
            -v \
            -storetype PKCS12 \
            -keystore "$KEYSTORE_REPO_PATH" \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -alias "$KEYSTORE_ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 36500 \
            -dname "CN=Privora Browser Release, OU=Mobile, O=GitHub Actions, L=San Francisco, S=CA, C=US"

          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Commit generated keystore to main
        if: steps.ensure_keystore.outputs.created == 'true'
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f "$KEYSTORE_REPO_PATH"

          if git diff --cached --quiet; then
            echo "No keystore changes to commit."
            exit 0
          fi

          git commit -m "chore: add prod release keystore"
          git push origin HEAD:main

      - name: Grant Gradle wrapper permission
        run: chmod +x ./gradlew

      - name: Configure CI Gradle properties
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.gradle"
          {
            echo "android.enableR8.fullMode=false"
            echo "org.gradle.daemon.performance.disable-logging=true"
          } >> "$HOME/.gradle/gradle.properties"

      - name: Resolve version info
        id: version_info
        run: |
          set -euo pipefail
          COMMON_GRADLE_ARGS=(
            "-Dorg.gradle.jvmargs=${GRADLE_JVM_ARGS}"
            "-Dkotlin.daemon.jvmargs=${KOTLIN_DAEMON_JVM_ARGS}"
            --max-workers=1
            --no-parallel
            --build-cache
          )

          VERSION_NAME="$(./gradlew -q :app:printProdReleaseVersionName --console=plain "${COMMON_GRADLE_ARGS[@]}")"
          AAB_NAME="$(./gradlew -q :app:printProdReleaseAabName --console=plain "${COMMON_GRADLE_ARGS[@]}")"

          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "aab_name=$AAB_NAME" >> "$GITHUB_OUTPUT"

      - name: Build signed prodRelease AAB
        run: |
          set -euo pipefail
          COMMON_GRADLE_ARGS=(
            "-Dorg.gradle.jvmargs=${GRADLE_JVM_ARGS}"
            "-Dkotlin.daemon.jvmargs=${KOTLIN_DAEMON_JVM_ARGS}"
            --max-workers=1
            --no-parallel
            --build-cache
          )

          ./gradlew :app:bundleProdRelease \
            -x lint \
            -x :app:lintProdRelease \
            -x :app:lintVitalProdRelease \
            -x :app:lintVitalAnalyzeProdRelease \
            -x :app:lintVitalReportProdRelease \
            "${COMMON_GRADLE_ARGS[@]}" \
            --no-daemon \
            --stacktrace

      - name: Rename AAB output
        id: rename_aab
        run: |
          set -euo pipefail

          AAB_DIR="app/build/outputs/bundle/prodRelease"
          TARGET_AAB="$AAB_DIR/${{ steps.version_info.outputs.aab_name }}"
          SOURCE_AAB="$(find "$AAB_DIR" -maxdepth 1 -type f -name '*.aab' | head -n 1)"

          if [ -z "$SOURCE_AAB" ]; then
            echo "No AAB file found in $AAB_DIR" >&2
            exit 1
          fi

          if [ "$SOURCE_AAB" != "$TARGET_AAB" ]; then
            rm -f "$TARGET_AAB"
            mv "$SOURCE_AAB" "$TARGET_AAB"
          fi

          echo "target_aab=$TARGET_AAB" >> "$GITHUB_OUTPUT"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version_info.outputs.aab_name }}
          path: ${{ steps.rename_aab.outputs.target_aab }}
          if-no-files-found: error
          retention-days: 30
